version: "3.8"
services:
  control_api:
    build:
      context: ./docker
      dockerfile: Dockerfile.api
    container_name: mercury_control_api
    environment:
      - PYTHONPATH=/app/src
      - CONTROL_API_TOKEN=${CONTROL_API_TOKEN}
    volumes:
      - ./src:/app/src:ro
      - ./data:/app/data
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  agent:
    build:
      context: ./docker
      dockerfile: Dockerfile.agent
    container_name: mercury_agent
    environment:
      - PYTHONPATH=/app/src
      - MERCURY_BET_CHECK_INTERVAL=60
    volumes:
      - ./src:/app/src:ro
      - ./data:/app/data
    depends_on:
      - control_api
    restart: unless-stopped
